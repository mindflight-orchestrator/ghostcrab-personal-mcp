name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  node:
    name: Node runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify npm pack
        run: npm run verify:pack

      - name: Test
        run: npm run test

  docker-native:
    name: Docker native
    runs-on: ubuntu-latest
    needs: node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run sequential E2E verification
        run: |
          GHOSTCRAB_POSTGRES_STACK=native PG_PORT=5432 DATABASE_URL=postgres://ghostcrab:ghostcrab@localhost:5432/ghostcrab npm run verify:e2e

name: Publish

# GitHub Actions — publish on tags when this repository is hosted on GitHub.
# npm OIDC / provenance assume GitHub; for other hosts (e.g. GitLab-only), replicate
# the same steps with a masked NPM_TOKEN.
#
# Intended pipeline (to align with docs/dev/npm_split_release_process.md):
#   1. Cross-compile Zig backends → prebuilds/{platform}/ (Zig 0.16.x per scripts/cross-build-all.sh).
#   2. npm ci && npm run build
#   3. Publish the five @mindflight/ghostcrab-personal-mcp-* platform packages, then the root package (scripts/publish-npm-split.mjs).

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read
  id-token: write   # required for npm trusted publishing (OIDC)

env:
  ZIG_VERSION: "0.16.0"
  SQLITE_VERSION: "3490100"
  SQLITE_YEAR: "2025"
  NODE_VERSION: "20"

jobs:
  # ── Job 1: cross-compile the Zig backend for all platforms ─────────────────
  build-backends:
    name: Cross-compile backends
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig ${{ env.ZIG_VERSION }}
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Vendor mindbrain
        run: scripts/ensure-vendor.sh
        env:
          MINDBRAIN_REPO_URL: https://gitlab.com/webigniter/mindbrain.git

      - name: Download sqlite3 amalgamation
        run: scripts/download-sqlite3.sh
        env:
          SQLITE_VERSION: ${{ env.SQLITE_VERSION }}
          SQLITE_YEAR: ${{ env.SQLITE_YEAR }}

      - name: Cross-compile all platforms
        run: scripts/cross-build-all.sh
        env:
          ZIG_OPTIMIZE: ReleaseFast

      - name: List prebuilds
        run: find prebuilds -type f | sort

      - name: Upload prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds
          path: prebuilds/
          retention-days: 1

  # ── Job 2: publish to npm with provenance ───────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-backends
    environment: npm-publish   # configure trusted publishing in this environment

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Download prebuilds
        uses: actions/download-artifact@v4
        with:
          name: prebuilds
          path: prebuilds/

      - name: List package contents (pre-publish audit)
        run: |
          npm pack --dry-run 2>&1 | head -60
          echo "---"
          find prebuilds -type f | sort

      - name: Verify binary is executable (Linux x64 spot-check)
        run: |
          chmod +x prebuilds/linux-x64/ghostcrab-backend
          file prebuilds/linux-x64/ghostcrab-backend

      - name: Publish to npm (platform packages + root)
        run: node scripts/publish-npm-split.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
